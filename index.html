<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>GeoFlights Pro | Busca Real Online</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f5f7; padding: 20px; color: #172b4d; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; color: #0052cc; margin-bottom: 30px; }
        .search-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #6b778c; text-transform: uppercase; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #dfe1e6; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff8b00; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #e67e00; }
        .card { border: 1px solid #e2e8f0; padding: 20px; border-radius: 15px; margin-top: 20px; display: flex; justify-content: space-between; align-items: center; background: white; transition: 0.3s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .total-price { font-size: 28px; font-weight: 800; color: #172b4d; }
        #loader { text-align: center; margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: 600; }
        .status-info { color: #0052cc; background: #e6f0ff; border: 1px solid #b3d4ff; }
        .status-error { color: #d32f2f; background: #ffebee; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GeoFlights 🌍</h1>
        <p>Busca Real & Inteligente (Online)</p>
    </div>

    <div class="search-grid">
        <div>
            <label>Sair de</label>
            <select id="origem">
                <option value="RAO">Ribeirão Preto (RAO)</option>
                <option value="GRU">Guarulhos (GRU)</option>
                <option value="VCP">Campinas (VCP)</option>
            </select>
        </div>
        <div>
            <label>Ir para (IATA)</label>
            <input type="text" id="destino" value="PRG" placeholder="Ex: PRG, CDG, JFK">
        </div>
        <div>
            <label>Data</label>
            <input type="date" id="data" value="2026-08-20">
        </div>
    </div>

    <button onclick="buscar()">BUSCAR AGORA</button>

    <div id="loader" style="display:none;"></div>
    <div id="resultados"></div>
</div>

<script>
    async function buscar() {
        const o = document.getElementById('origem').value;
        const d = document.getElementById('destino').value.toUpperCase();
        const dt = document.getElementById('data').value;
        const resDiv = document.getElementById('resultados');
        const loader = document.getElementById('loader');

        // Reset visual
        loader.className = "status-info";
        loader.style.display = "block";
        loader.innerText = "🔎 Acordando o servidor e buscando preços reais (isso pode levar uns segundos)...";
        resDiv.innerHTML = "";

        if (!d || !dt) {
            loader.className = "status-error";
            loader.innerText = "❌ Por favor, preencha o destino e a data.";
            return;
        }

        try {
            // CONEXÃO COM SEU SERVIDOR NO RENDER
            const url = `https://geoflights-backend.onrender.com/api/buscar?origemId=${o}&destinoId=${d}&data=${dt}`;
            
            const response = await fetch(url);
            
            // Verificação rigorosa de erros
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || "Erro desconhecido do servidor");
            }
            
            const dados = await response.json();

            loader.style.display = "none";
            
            if (dados.length === 0) {
                resDiv.innerHTML = "<p style='text-align:center; padding:20px; color:#6b778c;'>Nenhum voo encontrado para esta rota nesta data.</p>";
                return;
            }

            dados.forEach(v => {
                resDiv.innerHTML += `
                    <div class="card">
                        <div>
                            <strong style="color:#0052cc; font-size:18px;">Via ${v.aero} (${v.cia})</strong>
                            <div style="font-size:14px; color:#64748b; margin-top:8px;">
                                🚌 ${v.transporte}: R$ ${v.custoBus}<br>
                                ✈️ Voo: R$ ${v.precoVoo}
                            </div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-size:10px; font-weight:bold; color:#94a3b8;">CUSTO TOTAL APROXIMADO</div>
                            <div class="total-price">R$ ${v.total.toLocaleString('pt-BR')}</div>
                        </div>
                    </div>
                `;
            });
        } catch (err) {
            loader.className = "status-error";
            loader.innerText = `❌ Falha na busca: ${err.message}. Tente novamente.`;
            console.error(err);
        }
    }
</script>

</body>
</html>
